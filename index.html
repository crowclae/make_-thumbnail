<script id="workerSrc" type="text/plain">
'use strict';

let librawModule = null;

self.onmessage = async (ev) => {
  const msg = ev.data;

  if (msg.type === 'init') {
    settings = msg.settings;
    total = msg.total;
    completed = 0;
    canvas = new OffscreenCanvas(settings.outputWidth, settings.outputHeight);
    ctx = canvas.getContext('2d');
    
    // メインスレッドから渡されたベースURLを元に、Wasmを正しくインポート
    if (msg.baseUrl && !librawModule) {
      try {
        const librawUrl = new URL('libraw.js', msg.baseUrl).href;
        importScripts(librawUrl);
        if (typeof createLibRaw !== 'undefined') {
          const Module = await createLibRaw();
          librawModule = Module;
          console.log("[Worker] Wasm LibRaw successfully initialized.");
        }
      } catch (e) {
        console.warn("[Worker] Wasm initialization deferred or failed. Falling back to Embedded JPEG.", e);
      }
    }

    if (!settings.transparentMode) {
      ctx.fillStyle = settings.bgColor;
      ctx.fillRect(0, 0, settings.outputWidth, settings.outputHeight);
    } else {
      ctx.clearRect(0, 0, settings.outputWidth, settings.outputHeight);
    }
    
    self.postMessage({ type: 'ready' });
    return;
  }

  if (msg.type === 'file') {
    const { buffer, index } = msg;
    try {
      await processOne(buffer, index);
    } catch(e) {
      self.postMessage({ type: 'slot_free', error: String(e), index });
      return;
    }
    completed++;
    self.postMessage({ type: 'slot_free', current: completed, total, index });
    return;
  }

  if (msg.type === 'finalize') {
    const mimeType = settings.transparentMode ? 'image/png' : 'image/jpeg';
    const quality = settings.transparentMode ? undefined : 0.93;
    const blob = await canvas.convertToBlob({ type: mimeType, quality: quality });
    self.postMessage({ type: 'complete', blob });
    return;
  }
};

function parseDNGDimensions(buffer) {
  const view = new DataView(buffer);
  const le = view.getUint16(0, false) === 0x4949;
  try {
    const ifdOffset = view.getUint32(4, le);
    if (ifdOffset <= 0 || ifdOffset + 2 >= buffer.byteLength) return { width: 0, height: 0 };
    const count = view.getUint16(ifdOffset, le);
    let width = 0, height = 0;

    for (let i = 0; i < count; i++) {
      const e = ifdOffset + 2 + i * 12;
      if (e + 12 > buffer.byteLength) break;
      const tag = view.getUint16(e, le);
      const value = view.getUint32(e + 8, le);
      if (tag === 256) width = value;
      if (tag === 257) height = value;
    }
    return { width, height };
  } catch(_) {
    return { width: 0, height: 0 };
  }
}

function extractEmbeddedJpeg(buffer) {
  const bytes = new Uint8Array(buffer);
  if (bytes.length < 8) return null;
  const isLE = bytes[0] === 0x49 && bytes[1] === 0x49;
  const isBE = bytes[0] === 0x4D && bytes[1] === 0x4D;
  if (!isLE && !isBE) return scanForLargestJpeg(bytes, buffer);
  
  const view = new DataView(buffer);
  const le = isLE;
  let bestOffset = -1, bestLen = 0;

  function parseIFD(off, depth) {
    if (depth > 8 || off <= 0 || off + 2 >= buffer.byteLength) return;
    let count;
    try { count = view.getUint16(off, le); } catch(e) { return; }
    if (count === 0 || count > 600) return;

    let jOff = -1, jLen = -1;
    for (let i = 0; i < count; i++) {
      const e = off + 2 + i * 12;
      if (e + 12 > buffer.byteLength) break;
      let tag, type, cnt;
      try {
        tag = view.getUint16(e, le);
        type = view.getUint16(e + 2, le);
        cnt = view.getUint32(e + 4, le);
      } catch(_) { break; }
      
      if (tag === 0x0201 || tag === 0x0111) {
        if (cnt === 1) { try { jOff = view.getUint32(e + 8, le); } catch(_) {} }
      } else if (tag === 0x0202 || tag === 0x0117) {
        if (cnt === 1) { try { jLen = view.getUint32(e + 8, le); } catch(_) {} }
      } else if (tag === 0x014A || tag === 0x8769 || tag === 0xA005) {
        try {
          if (type === 4 && cnt === 1) parseIFD(view.getUint32(e + 8, le), depth + 1);
        } catch(_) {}
      }
    }
    if (jOff > 0 && jLen > 0 && jOff + jLen <= buffer.byteLength && jLen > bestLen) {
      bestLen = jLen; bestOffset = jOff;
    }
    try {
      const nextOff = view.getUint32(off + 2 + count * 12, le);
      if (nextOff > 0 && nextOff !== off) parseIFD(nextOff, depth + 1);
    } catch(_) {}
  }
  
  try { parseIFD(view.getUint32(4, le), 0); } catch(_) {}
  
  if (bestOffset > 0 && bestOffset + 2 <= bytes.length) {
    if (bytes[bestOffset] === 0xFF && bytes[bestOffset + 1] === 0xD8) {
      return buffer.slice(bestOffset, bestOffset + bestLen);
    }
  }
  return scanForLargestJpeg(bytes, buffer);
}

function scanForLargestJpeg(bytes, buffer) {
  let bestOff = -1, bestSize = 0;
  let i = 0;
  const len = bytes.length;
  while (i < len - 1) {
    if (bytes[i] === 0xFF && bytes[i + 1] === 0xD8) {
      const start = i;
      let j = i + 2;
      let foundEOI = false;
      while (j < len - 1) {
        if (bytes[j] === 0xFF && bytes[j + 1] !== 0x00) {
          const marker = bytes[j + 1];
          if (marker === 0xD9) {
            const size = j + 2 - start;
            if (size > bestSize) { bestSize = size; bestOff = start; }
            i = j + 2;
            foundEOI = true;
            break;
          } else if (marker >= 0xC0 && marker <= 0xFE && marker !== 0xDA && marker !== 0xD9) {
            if (j + 3 < len) {
              const segLen = (bytes[j + 2] << 8) | bytes[j + 3];
              j += 2 + segLen;
              continue;
            }
          }
        }
        j++;
      }
      if (!foundEOI) i++;
    } else {
      i++;
    }
  }
  return bestOff >= 0 ? buffer.slice(bestOff, bestOff + bestSize) : null;
}

async function decodeRawReal(buffer) {
  const bytes = new Uint8Array(buffer);
  const dims = parseDNGDimensions(buffer);
  const width = dims.width || 512;
  const height = dims.height || 512;

  const canvas = new OffscreenCanvas(width, height);
  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(width, height);
  const rgba = img.data;

  const pixels = width * height;
  const bytesPerPixel = Math.floor(bytes.length / pixels);
  const isRGB24 = bytesPerPixel >= 3;
  let p = Math.floor(bytes.length * 0.1);

  if (isRGB24) {
    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        const i = (y * width + x) * 4;
        rgba[i]     = bytes[p]     || 0;
        rgba[i + 1] = bytes[p + 1] || 0;
        rgba[i + 2] = bytes[p + 2] || 0;
        rgba[i + 3] = 255;
        p += 3;
        if (p >= bytes.length - 3) p = Math.floor(bytes.length * 0.1);
      }
    }
  } else {
    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        const i = (y * width + x) * 4;
        const v = (((bytes[p] << 8) | bytes[p + 1]) >> 4);
        p += 2;
        const c = Math.max(0, Math.min(255, v / 16));
        const evenRow = (y & 1) === 0;
        const evenCol = (x & 1) === 0;
        let r = 0, g = 0, b = 0;
        if (evenRow && evenCol) r = c;
        else if (evenRow && !evenCol) g = c;
        else if (!evenRow && evenCol) g = c;
        else b = c;

        rgba[i]     = r || g || b;
        rgba[i + 1] = g || r || b;
        rgba[i + 2] = b || g || r;
        rgba[i + 3] = 255;
        if (p >= bytes.length - 2) p = Math.floor(bytes.length * 0.1);
      }
    }
  }
  ctx.putImageData(img, 0, 0);
  return await createImageBitmap(canvas);
}

let canvas = null, ctx = null, settings = null, total = 0, completed = 0;

async function processOne(buffer, index) {
  const s = settings;
  const h = new Uint8Array(buffer, 0, 4);
  const isRawFile = (h[0]===0x49&&h[1]===0x49) || (h[0]===0x4D&&h[1]===0x4D);
  
  let bitmap = null;

  if (isRawFile && librawModule) {
    let rawPtr = 0;
    try {
      const numBytes = buffer.byteLength;
      if (typeof librawModule._malloc === 'function' && typeof librawModule.process_to_rgba === 'function') {
        rawPtr = librawModule._malloc(numBytes);
        const heapBytes = new Uint8Array(librawModule.HEAPU8.buffer, rawPtr, numBytes);
        heapBytes.set(new Uint8Array(buffer));

        const imageResult = librawModule.process_to_rgba(rawPtr, numBytes);
        if (imageResult && imageResult.rgbaPointer) {
          const pixelLen = imageResult.width * imageResult.height * 4;
          const pixelArray = new Uint8ClampedArray(librawModule.HEAPU8.buffer, imageResult.rgbaPointer, pixelLen);
          const imgData = new ImageData(pixelArray, imageResult.width, imageResult.height);
          bitmap = await createImageBitmap(imgData);
          if (librawModule.free_result) librawModule.free_result(imageResult.rgbaPointer);
        }
      }
    } catch (wasmErr) {
      console.error("[Worker] Wasm native process failed. Falling back to embedded JPEG:", wasmErr);
    } finally {
      if (rawPtr && librawModule._free) librawModule._free(rawPtr);
    }
  }

  if (!bitmap && isRawFile) {
    const extracted = extractEmbeddedJpeg(buffer);
    if (extracted) {
      const blob = new Blob([extracted], { type: 'image/jpeg' });
      const maxDim = Math.max(s.thumbW, s.thumbH) * 2;
      try {
        bitmap = await createImageBitmap(blob, {
          resizeWidth: maxDim,
          resizeQuality: 'medium'
        });
      } catch(_) {
        bitmap = null;
      }
    }
  }

  if (!bitmap && isRawFile) {
    bitmap = await decodeRawReal(buffer);
  }

  if (!bitmap) {
    const blob = new Blob([buffer]);
    const maxDim = Math.max(s.thumbW, s.thumbH) * 2;
    bitmap = await createImageBitmap(blob, {
      resizeWidth: maxDim,
      resizeQuality: 'medium'
    });
  }

  const col = index % s.cols;
  const row = Math.floor(index / s.cols);
  const cx  = s.padX + col * (s.thumbW + s.gapX);
  const cy  = s.padY + row * (s.thumbH + s.gapY);

  ctx.save();
  ctx.beginPath();
  ctx.rect(cx, cy, s.thumbW, s.thumbH);
  ctx.clip();

  const bw = bitmap.width, bh = bitmap.height;
  if (s.cropMode) {
    const minDim = Math.min(bw, bh);
    const sx = (bw - minDim) / 2;
    const sy = (bh - minDim) / 2;
    ctx.drawImage(bitmap, sx, sy, minDim, minDim, cx, cy, s.thumbW, s.thumbH);
  } else {
    const scale = Math.min(s.thumbW / bw, s.thumbH / bh);
    const dw = bw * scale, dh = bh * scale;
    ctx.drawImage(bitmap, cx + (s.thumbW - dw) / 2, cy + (s.thumbH - dh) / 2, dw, dh);
  }

  ctx.restore();
  bitmap.close();
}
</script>

<script>
'use strict';

const strip = document.getElementById('filmstrip');
for (let i = 0; i < 80; i++) {
  const h = document.createElement('div');
  h.className = 'filmstrip-hole';
  strip.appendChild(h);
}

// 読み込んだファイルのオブジェクトと、そのArrayBufferをペアで管理する配列
let files = []; 
let worker = null;
let isProcessing = false;
let draggedItemIdx = null;

const dropzone   = document.getElementById('dropzone');
const fileInput  = document.getElementById('fileInput');
const fileGrid   = document.getElementById('file-grid');
const fileCount  = document.getElementById('file-count');
const fileWrap   = document.getElementById('file-list-wrap');
const btnGen     = document.getElementById('btn-generate');
const btnClear   = document.getElementById('btn-clear');
const progFill   = document.getElementById('prog-fill');
const progText   = document.getElementById('prog-text');
const progPct    = document.getElementById('prog-pct');
const alertEl    = document.getElementById('alert');
const outputSec  = document.getElementById('output-section');
const previewCvs = document.getElementById('preview-canvas');
const btnDl      = document.getElementById('btn-download');

const g = id => document.getElementById(id);

function extractEmbeddedJpeg(buffer) {
  const bytes = new Uint8Array(buffer);
  if (bytes.length < 8) return null;
  const isLE = bytes[0] === 0x49 && bytes[1] === 0x49;
  const isBE = bytes[0] === 0x4D && bytes[1] === 0x4D;
  if (!isLE && !isBE) return scanForLargestJpeg(bytes, buffer);
  
  const view = new DataView(buffer);
  const le = isLE;
  let bestOffset = -1, bestLen = 0;

  function parseIFD(off, depth) {
    if (depth > 8 || off <= 0 || off + 2 >= buffer.byteLength) return;
    let count;
    try { count = view.getUint16(off, le); } catch(e) { return; }
    if (count === 0 || count > 600) return;

    let jOff = -1, jLen = -1;
    for (let i = 0; i < count; i++) {
      const e = off + 2 + i * 12;
      if (e + 12 > buffer.byteLength) break;
      let tag, type, cnt;
      try {
        tag = view.getUint16(e, le);
        type = view.getUint16(e + 2, le);
        cnt = view.getUint32(e + 4, le);
      } catch(_) { break; }
      
      if (tag === 0x0201 || tag === 0x0111) {
        if (cnt === 1) { try { jOff = view.getUint32(e + 8, le); } catch(_) {} }
      } else if (tag === 0x0202 || tag === 0x0117) {
        if (cnt === 1) { try { jLen = view.getUint32(e + 8, le); } catch(_) {} }
      } else if (tag === 0x014A || tag === 0x8769 || tag === 0xA005) {
        try {
          if (type === 4 && cnt === 1) parseIFD(view.getUint32(e + 8, le), depth + 1);
        } catch(_) {}
      }
    }
    if (jOff > 0 && jLen > 0 && jOff + jLen <= buffer.byteLength && jLen > bestLen) {
      bestLen = jLen; bestOffset = jOff;
    }
    try {
      const nextOff = view.getUint32(off + 2 + count * 12, le);
      if (nextOff > 0 && nextOff !== off) parseIFD(nextOff, depth + 1);
    } catch(_) {}
  }
  
  try { parseIFD(view.getUint32(4, le), 0); } catch(_) {}
  
  if (bestOffset > 0 && bestOffset + 2 <= bytes.length) {
    if (bytes[bestOffset] === 0xFF && bytes[bestOffset + 1] === 0xD8) {
      return buffer.slice(bestOffset, bestOffset + bestLen);
    }
  }
  return scanForLargestJpeg(bytes, buffer);
}

function scanForLargestJpeg(bytes, buffer) {
  let bestOff = -1, bestSize = 0;
  let i = 0;
  const len = bytes.length;
  while (i < len - 1) {
    if (bytes[i] === 0xFF && bytes[i + 1] === 0xD8) {
      const start = i;
      let j = i + 2;
      let foundEOI = false;
      while (j < len - 1) {
        if (bytes[j] === 0xFF && bytes[j + 1] !== 0x00) {
          const marker = bytes[j + 1];
          if (marker === 0xD9) {
            const size = j + 2 - start;
            if (size > bestSize) { bestSize = size; bestOff = start; }
            i = j + 2;
            foundEOI = true;
            break;
          } else if (marker >= 0xC0 && marker <= 0xFE && marker !== 0xDA && marker !== 0xD9) {
            if (j + 3 < len) {
              const segLen = (bytes[j + 2] << 8) | bytes[j + 3];
              j += 2 + segLen;
              continue;
            }
          }
        }
        j++;
      }
      if (!foundEOI) i++;
    } else {
      i++;
    }
  }
  return bestOff >= 0 ? buffer.slice(bestOff, bestOff + bestSize) : null;
}

function calcOptimalGrid(n, outW, outH, padX, padY, gapX, gapY, cropMode) {
  if (n <= 0) return { cols: 1, rows: 1 };
  const IMG_W = cropMode ? 1 : 4;
  const IMG_H = cropMode ? 1 : 3;
  
  let bestCols = 1, bestArea = -1;
  for (let c = 1; c <= n; c++) {
    const r  = Math.ceil(n / c);
    const tw = (outW - 2 * padX - (c - 1) * gapX) / c;
    const th = (outH - 2 * padY - (r - 1) * gapY) / r;
    if (tw <= 0 || th <= 0) continue;
    const scale = Math.min(tw / IMG_W, th / IMG_H);
    const area  = (IMG_W * scale) * (IMG_H * scale);
    if (area > bestArea) { bestArea = area; bestCols = c; }
  }
  return { cols: bestCols, rows: Math.ceil(n / bestCols) };
}

function getSettings() {
  const outW = Math.max(100, parseInt(g('outW').value) || 4000);
  const outH = Math.max(100, parseInt(g('outH').value) || 3000);
  const gapX = Math.max(0, parseInt(g('gapX').value) || 4);
  const gapY = Math.max(0, parseInt(g('gapY').value) || 4);
  const padX = Math.max(0, parseInt(g('padX').value) || 12);
  const padY = Math.max(0, parseInt(g('padY').value) || 12);
  const bgColor = g('bgColor').value || '#000000';
  const cropMode = g('cropMode').checked;
  const transparentMode = g('transparentMode').checked; 
  const filename = g('filename').value || 'contact_sheet';

  const n = files.length || 1;
  const { cols, rows } = calcOptimalGrid(n, outW, outH, padX, padY, gapX, gapY, cropMode);
  const thumbW = Math.floor((outW - 2 * padX - (cols - 1) * gapX) / cols);
  const thumbH = Math.floor((outH - 2 * padY - (rows - 1) * gapY) / rows);

  return { cols, rows, outW, outH, gapX, gapY, padX, padY, bgColor, cropMode, transparentMode, filename, outputWidth: outW, outputHeight: outH, thumbW, thumbH };
}

function updateComputed() {
  const s = getSettings();
  if (files.length === 0) {
    g('grid-computed').innerHTML = 'ファイルを追加すると自動計算します';
    g('thumb-computed').innerHTML = '—';
    return;
  }
  g('grid-computed').innerHTML = `列 <strong>${s.cols}</strong> × 行 <strong>${s.rows}</strong> = <strong>${s.cols*s.rows}</strong> 枠`;
  g('thumb-computed').innerHTML = `サムネイル: <strong>${s.thumbW} × ${s.thumbH} px</strong>`;
}

window.setBgPreset = function(colorCode) {
  const bgColorInput = document.getElementById('bgColor');
  if (bgColorInput) {
    bgColorInput.value = colorCode;
    if (typeof updateComputed === 'function') updateComputed();
    if (typeof updateGenBtn === 'function') updateGenBtn();
  }
};

function updateGenBtn() { btnGen.disabled = files.length === 0 || isProcessing; }

g('transparentMode').addEventListener('change', (e) => {
  g('bgColorField').style.opacity = e.target.checked ? '0.4' : '1';
  btnDl.textContent = e.target.checked ? '↓ DOWNLOAD PNG' : '↓ DOWNLOAD JPEG';
});

['outW','outH','gapX','gapY','padX','padY','cropMode', 'transparentMode'].forEach(id => {
  g(id).addEventListener('input', () => { updateComputed(); updateGenBtn(); });
});

const RAW_EXT = /\.(arw|nef|cr2|cr3|orf|dng)$/i;
function isRaw(f) { return RAW_EXT.test(f.name); }

function decodeRawFallbackMain(buffer, cropMode) {
  const bytes = new Uint8Array(buffer);
  const len = bytes.length;
  if (len === 0) return '';
  const width = 100;
  const height = cropMode ? 100 : 75; 
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(width, height);
  const rgba = imgData.data;
  
  let byteIdx = 0;
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const idx = (y * width + x) * 4;
      rgba[idx]     = bytes[byteIdx % len] || 0;
      rgba[idx + 1] = bytes[(byteIdx + 1) % len] || 0;
      rgba[idx + 2] = bytes[(byteIdx + 2) % len] || 0;
      rgba[idx + 3] = 255;
      byteIdx += Math.floor(len / (width * height));
    }
  }
  ctx.putImageData(imgData, 0, 0);
  return canvas.toDataURL('image/jpeg');
}

// ファイル追加時に非同期で一度だけ ArrayBuffer を先読みして保持させる
async function addFiles(newFiles) {
  const added = Array.from(newFiles).filter(f => f.type.startsWith('image/') || isRaw(f));
  
  for (const fileObj of added) {
    try {
      const buf = await fileObj.arrayBuffer();
      files.push({ file: fileObj, buffer: buf });
    } catch (e) {
      console.error("ファイルの読み込みに失敗しました:", fileObj.name, e);
    }
  }

  renderFileList(); 
  updateComputed(); 
  updateGenBtn();
}

function cropToSquare(imageSource, cropMode) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      if (!cropMode) {
        resolve(img.src); 
        return;
      }
      const canvas = document.createElement('canvas');
      const size = Math.min(img.width, img.height);
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const sx = (img.width - size) / 2;
      const sy = (img.height - size) / 2;
      ctx.drawImage(img, sx, sy, size, size, 0, 0, size, size);
      resolve(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.src = imageSource instanceof Blob ? URL.createObjectURL(imageSource) : imageSource;
  });
}

g('cropMode').addEventListener('change', () => {
  renderFileList();
});

function renderFileList() {
  fileGrid.innerHTML = '';
  const cropMode = g('cropMode').checked;

  files.forEach((item, i) => {
    const f = item.file;
    const buf = item.buffer;

    const card = document.createElement('div'); 
    card.className = 'file-card';
    card.draggable = true;
    card.dataset.index = i;

    card.addEventListener('dragstart', (e) => {
      draggedItemIdx = i;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    card.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (draggedItemIdx === null || draggedItemIdx === i) return;
      card.classList.add('drag-over-card');
    });

    card.addEventListener('dragleave', () => {
      card.classList.remove('drag-over-card');
    });

    card.addEventListener('drop', (e) => {
      e.preventDefault();
      card.classList.remove('drag-over-card');
      if (draggedItemIdx === null || draggedItemIdx === i) return;

      const draggedItem = files[draggedItemIdx];
      files.splice(draggedItemIdx, 1);
      files.splice(i, 0, draggedItem);

      draggedItemIdx = null;
      renderFileList();
      updateComputed();
    });

    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      draggedItemIdx = null;
    });

    const thumb = document.createElement('div'); thumb.className = 'file-thumb';
    if (cropMode) {
      thumb.style.aspectRatio = '1 / 1';
      card.style.aspectRatio = '1 / 1';
    }

    const removeBtn = document.createElement('button');
    removeBtn.className = 'btn-remove-file'; removeBtn.textContent = '✕';
    removeBtn.onclick = (e) => { e.stopPropagation(); files.splice(i,1); renderFileList(); updateComputed(); updateGenBtn(); };
    thumb.appendChild(removeBtn);

    const img = document.createElement('img');
    
    if (!isRaw(f)) {
      cropToSquare(f, cropMode).then(src => {
        img.src = src;
        if (src.startsWith('blob:')) {
          img.onload = () => URL.revokeObjectURL(src);
        }
        thumb.appendChild(img);
      });
    } else {
      const badge = document.createElement('div'); badge.className = 'raw-badge'; badge.textContent = 'RAW';
      thumb.appendChild(badge);
      
      const jpg = extractEmbeddedJpeg(buf);
      if (jpg) {
        cropToSquare(new Blob([jpg], { type: 'image/jpeg' }), cropMode).then(src => {
          img.src = src;
          if (src.startsWith('blob:')) {
            img.onload = () => URL.revokeObjectURL(src);
          }
          thumb.appendChild(img);
        });
      } else {
        img.src = decodeRawFallbackMain(buf, cropMode);
        thumb.appendChild(img);
      }
    }

    const status = document.createElement('div'); status.className = 'file-status'; status.id = `status-${i}`;
    thumb.appendChild(status);
    const name = document.createElement('div'); name.className = 'file-name'; name.textContent = f.name;
    card.appendChild(thumb); card.appendChild(name); fileGrid.appendChild(card);
  });
  fileCount.textContent = `${files.length} FILES`;
  fileWrap.style.display = files.length ? '' : 'none';
}

btnClear.onclick = () => { files = []; renderFileList(); updateComputed(); updateGenBtn(); outputSec.classList.remove('visible'); };
dropzone.ondragover = e => { e.preventDefault(); dropzone.classList.add('drag-over'); };
dropzone.ondragleave = () => dropzone.classList.remove('drag-over');
dropzone.ondrop = e => { e.preventDefault(); dropzone.classList.remove('drag-over'); addFiles(e.dataTransfer.files); };
fileInput.onchange = () => { addFiles(fileInput.files); fileInput.value = ''; };

function setProgress(pct, text, pctLabel) {
  progFill.style.width = `${pct}%`; progText.textContent = text; progPct.textContent = pctLabel;
}

function createWorker() {
  const src = document.getElementById('workerSrc').textContent;
  return new Worker(URL.createObjectURL(new Blob([src], { type: 'application/javascript' })));
}

btnGen.onclick = async () => {
  if (isProcessing || files.length === 0) return;
  const s = getSettings();
  isProcessing = true; btnGen.disabled = true;
  outputSec.classList.remove('visible');

  const total = Math.min(files.length, s.cols * s.rows);
  setProgress(0, `0 / ${total} 現像処理中...`, '0%');

  worker = createWorker();
  let nextIndex = 0, activeSlots = 0, MAX_SLOTS = 4, completed = 0;

  worker.onmessage = async (ev) => {
    const msg = ev.data;
    if (msg.type === 'ready') { sendNext(); return; }
    if (msg.type === 'slot_free') {
      activeSlots--; completed++;
      const pct = Math.round((completed / total) * 100);
      setProgress(pct, `${completed} / ${total} 枚現像完了`, `${pct}%`);
      const dot = g(`status-${msg.index}`);
      if (dot) dot.className = msg.error ? 'file-status err' : 'file-status ok';
      sendNext();
      if (completed >= total && activeSlots === 0) {
        setProgress(100, 'マスターデータ結合出力中...', '100%');
        worker.postMessage({ type: 'finalize' });
      }
      return;
    }
    if (msg.type === 'complete') {
      const url = URL.createObjectURL(msg.blob);
      const img = new Image();
      img.onload = () => {
        const maxW = outputSec.offsetWidth - 40; const scale = Math.min(1, maxW / img.width);
        previewCvs.width = img.width * scale; previewCvs.height = img.height * scale;
        
        const pCtx = previewCvs.getContext('2d');
        if (s.transparentMode) {
          pCtx.clearRect(0, 0, previewCvs.width, previewCvs.height);
        } else {
          pCtx.fillStyle = s.bgColor;
          pCtx.fillRect(0, 0, previewCvs.width, previewCvs.height);
        }
        pCtx.drawImage(img, 0, 0, previewCvs.width, previewCvs.height);
      };
      img.src = url; btnDl.href = url; 
      const ext = s.transparentMode ? 'png' : 'jpg';
      btnDl.download = `${s.filename}.${ext}`;
      btnDl.textContent = s.transparentMode ? '↓ DOWNLOAD PNG' : '↓ DOWNLOAD JPEG';
      
      outputSec.classList.add('visible');
      outputSec.scrollIntoView({ behavior: 'smooth', block: 'start' });
      setProgress(100, '生成完了', '100%');
      worker.terminate(); worker = null; isProcessing = false; updateGenBtn();
    }
  };

  async function sendNext() {
    while (activeSlots < MAX_SLOTS && nextIndex < total) {
      const idx = nextIndex++; activeSlots++;
      const dot = g(`status-${idx}`); if (dot) dot.className = 'file-status busy';
      
      // すでに先読みして保持されている ArrayBuffer をそのまま渡す
      const buf = files[idx].buffer;
      if (buf && buf.byteLength > 0) {
        worker.postMessage({ type: 'file', buffer: buf, index: idx });
      } else {
        worker.postMessage({ type: 'file', buffer: new ArrayBuffer(0), index: idx });
      }
    }
  }

  worker.postMessage({ type: 'init', total, settings: s, baseUrl: window.location.href });
};
</script>
